apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-ui
  labels:
    app: hello-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-ui
  template:
    metadata:
      labels:
        app: hello-ui
    spec:
      containers:
        - name: hello-ui
          image: k8master:5000/hello-ui:latest
          # imagePullPolicy: Always  # This ensures it always pulls the latest
          # args:
          #   - "--port"
          #   - "3030"
          env:
          - name: PORT
            value: "3030"
          ports:
            - containerPort: 3030
---
apiVersion: v1
kind: Service
metadata:
  name: hello-ui-svc
spec:
  type: NodePort
  selector:
    app: hello-ui
  ports:
    - name: http
      port: 3000         # Service port
      targetPort: 3030   # Pod port or container port
      nodePort: 30030    # External port (this works from host)
