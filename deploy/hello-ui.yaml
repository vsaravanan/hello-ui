apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-ui
  labels:
    app: hello-ui
spec:
  replicas: 0
  selector:
    matchLabels:
      app: hello-ui
  template:
    metadata:
      labels:
        app: hello-ui
    spec:
      containers:
        - name: hello-ui
          image: k8master:5000/hello-ui:latest
          # imagePullPolicy: Always  # This ensures it always pulls the latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: hello-ui-svc
spec:
  type: NodePort
  selector:
    app: hello-ui
  ports:
    - port: 3000         # Service port
      targetPort: 3000   # Pod port or container port
      nodePort: 30030    # External port (this works from host)
