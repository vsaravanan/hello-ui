apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-ui
  labels:
    app: hello-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-ui
  template:
    metadata:
      labels:
        app: hello-ui
    spec:
      containers:
        - name: hello-ui
          image: k8master:5000/hello-ui:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: hello-ui-svc
spec:
  type: NodePort
  selector:
    app: hello-ui
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
